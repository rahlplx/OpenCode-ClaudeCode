name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Build CLI
        run: pnpm build:cli

      - name: Smoke test — bridge starts
        run: |
          node dist-cli/index.js serve --port 4080 --static-dir dist/ &
          sleep 3
          curl -sf http://localhost:4080/health
          kill %1
