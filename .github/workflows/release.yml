name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.payload.inputs.tag;
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: 'main',
              name: `${tag} — Initial consumer-ready release`,
              body: `## What's included

### Web app / Self-hosted
- React 19 + Zustand SPA (Kanna UI) served by Express 5 bridge
- Zen free tier → OpenRouter free → BYOK failover chain with circuit breaker
- Multi-tenant auth (password or no-password mode)
- WebSocket real-time protocol (subscribe/snapshot/command envelopes)
- Docker + docker-compose for self-hosted VPS deployment
- PWA installable from Chrome (offline shell, service worker)

### Windows EXE (Electron)
- Single-instance lock, loading screen, window state persistence
- No white flash, dark \`#0f0f10\` background
- Navigation guard, error dialog on bridge failure
- Builds: portable \`.exe\` + NSIS installer

### Android APK (Capacitor)
- Capacitor 6 WebView wrapper pointing at your self-hosted OpenCode instance
- Set \`OPENCODE_SERVER_URL=https://your-server.com pnpm build:android\` to configure
- R8 minification + ProGuard rules for Capacitor bridge + Cordova plugins
- targetSdkVersion 35 (Play Store compliant as of Aug 2025)
- Setup page shown when built without a server URL

## Quick start

\`\`\`bash
# Self-hosted
pnpm install && pnpm build
node dist-cli/index.js serve --port 4080 --static-dir dist/

# Windows EXE
pnpm build:win   # → dist-electron/*.exe

# Android APK
OPENCODE_SERVER_URL=https://your-server.com pnpm build:android
# then open android/ in Android Studio → Generate Signed APK
\`\`\`

## Test coverage
149 unit/integration tests across auth, circuit breaker, proxy translation, WebSocket protocol, chat sessions, provider config, and E2E simulation.`,
              draft: false,
              prerelease: false,
            });
            console.log('Release created:', release.html_url);
