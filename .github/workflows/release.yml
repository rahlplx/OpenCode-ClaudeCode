name: Create Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag name
        required: true
        default: v0.1.0
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: gh release create "$TAG" --title "$TAG - Initial consumer-ready release" --target main --generate-notes
