<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OpenCode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0f0f10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #888;
      user-select: none;
      -webkit-app-region: drag;
    }
    .loader { text-align: center; }
    .wordmark {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #2a2a2c;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 13px; color: #555; letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="wordmark">OpenCode</div>
    <div class="spinner"></div>
    <p class="status">Starting…</p>
  </div>
</body>
</html>
